services:
  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/collections || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-service:
    image: ghcr.io/ollama/ollama:latest
    container_name: ollama_service
    restart: unless-stopped
    ports:
      - "11434:11434"
    # If your Ollama image requires credentials or env vars (license/key), set them here.
    # environment:
    #   OLLAMA_LICENSE: "${OLLAMA_LICENSE:-}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot_app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SKIP_TESTS: "true"
    container_name: springboot_container
    ports:
      - "8080:8080"
    environment:
      # Provide both names so application.properties picks whichever is referenced
      QDRANT_HOST: "http://qdrant-db:6333"
      QDRANT_BASE_URL: "http://qdrant-db:6333"
      OLLAMA_HOST: "http://ollama-service:11434"
      OLLAMA_BASE_URL: "http://ollama-service:11434"
      OLLAMA_EMBED_MODEL: "embed-model"
      OLLAMA_CHAT_MODEL: "chat-model"
    depends_on:
      - qdrant-db
      - ollama-service

volumes:
  qdrant_storage:
