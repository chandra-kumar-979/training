# Ensure the workflow has the required permissions to publish packages (GHCR)
# If your organization blocks Actions from creating organization packages you may need to
# either allow Actions in the organization settings or use a PAT with write:packages scope
# stored as a repo secret and use that for GHCR login instead of GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

name: CI - Build and push (every push)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: eu-central-1
      ENV: dev
      # Expose Docker Hub creds as env (fallback to repo variables if needed)
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}
      # GHCR personal access token (fallback to repo variable if needed). If org blocks GITHUB_TOKEN,
      # create a PAT with write:packages and store as secret GHCR_PAT.
      GHCR_PAT: ${{ secrets.GHCR_PAT || vars.GHCR_PAT }}

    steps:
      - uses: actions/checkout@v4

      - name: Diagnostics - show credential contexts and runtime env
        run: |
          echo "context: secrets.AWS_ACCESS_KEY_ID present? -> "$( [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && echo yes || echo no )
          echo "context: secrets.AWS_SECRET_ACCESS_KEY present? -> "$( [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && echo yes || echo no )
          echo "context: vars.AWS_ACCESS_KEY_ID present? -> "$( [ -n "${{ vars.AWS_ACCESS_KEY_ID }}" ] && echo yes || echo no )
          echo "context: vars.AWS_SECRET_ACCESS_KEY present? -> "$( [ -n "${{ vars.AWS_SECRET_ACCESS_KEY }}" ] && echo yes || echo no )
          echo "runtime: AWS_ACCESS_KEY_ID env var set? -> "$( [ -n "$AWS_ACCESS_KEY_ID" ] && echo yes || echo no )
          echo "runtime: AWS_SECRET_ACCESS_KEY env var set? -> "$( [ -n "$AWS_SECRET_ACCESS_KEY" ] && echo yes || echo no )

      - name: Check required AWS credentials (secrets or variables)
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "Found AWS credentials in repository secrets.";
          elif [ -n "${{ vars.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ vars.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "Found AWS credentials in repository variables (vars).";
          else
            echo "::error::Required AWS credentials are missing. Define them as repository secrets (recommended) or repository variables named AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.";
            exit 1;
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || vars.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS credentials (sts:GetCallerIdentity)
        run: |
          set -e
          if ! aws sts get-caller-identity --output json >/tmp/aws-caller.json 2>/tmp/aws-caller.err; then
            echo "::error::AWS credentials are present but could not be validated (sts:GetCallerIdentity failed).";
            echo "Check that the provided credentials are correct and have sts:GetCallerIdentity permission.";
            echo "aws sts output:";
            sed -n '1,200p' /tmp/aws-caller.err || true
            exit 1;
          else
            echo "AWS credentials validated. Caller identity:";
            jq -r '.Account + " / " + .Arn' /tmp/aws-caller.json || cat /tmp/aws-caller.json
          fi

      - name: Determine AWS account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "aws_account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR
        run: mvn -B -f pom.xml clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rag-chatbot-app-0.0.1-SNAPSHOT.jar
          path: target/rag-chatbot-app-0.0.1-SNAPSHOT.jar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Amazon ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.aws-account.outputs.aws_account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-chatbot-app:latest
            ${{ steps.aws-account.outputs.aws_account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/rag-chatbot-app:${{ github.sha }}
