spring.application.name=ChatBot

# Updated URLs to accept Docker network configurations
# Accept either OLLAMA_HOST or OLLAMA_BASE_URL env var; fallback to localhost
ollama.base-url=${OLLAMA_HOST:${OLLAMA_BASE_URL:http://localhost:11434}}
# Accept either QDRANT_HOST or QDRANT_BASE_URL env var; fallback to localhost
qdrant.base-url=${QDRANT_HOST:${QDRANT_BASE_URL:http://localhost:6333}}

ollama.embed.model=embeddinggemma:300m
ollama.chat.model=qwen2.5:7b
